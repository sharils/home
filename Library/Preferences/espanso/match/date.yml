---
matches:
  - trigger: "%F,."
    replace: "{{F}}"
    vars:
      - name: F
        type: date
        params:
          format: "%F"

  - trigger: "%F=,."
    replace: "%Y-%m-%d"

  - trigger: "%R,."
    replace: "{{R}}"
    vars:
      - name: R
        type: date
        params:
          format: "%R"

  - trigger: "%R=,."
    replace: "%H:%M"

  - trigger: "%T,."
    replace: "{{T}}"
    vars:
      - name: T
        type: date
        params:
          format: "%T"

  - trigger: "%T=,."
    replace: "%H:%M:%S"

  - trigger: 0-,.
    replace: 23:59

  - trigger: 0:,.
    replace: 00:00:00

  - trigger: 0000,.
    replace: 0000-00-00T00:00:00Z

  - trigger: 1970,.
    replace: 1970-01-01T00:00:00Z

  - trigger: 2038,.
    replace: 2038-01-19T03:14:07Z

  - trigger: 9999,.
    replace: 9999-99-99T99:99:99Z

  - trigger: min,.
    replace: minute

  - trigger: 8601,.
    replace: "{{8601}}"
    vars:
      - name: 8601
        type: date
        params:
          format: "%FT%T%:z"

  - trigger: 8601u,.
    replace: "{{8601}}"
    vars:
      - name: 8601
        type: shell
        params:
          cmd: "date -u +%FT%TZ"

  - trigger: 8601w,.
    replace: "{{8601w}}"
    vars:
      - name: 8601w
        type: date
        params:
          format: "%Y-W%V"

  - trigger: Utc,.
    replace: UTC
